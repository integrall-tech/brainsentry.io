server:
  port: 8081
  context_path: /api
  shutdown_timeout: 30s

database:
  host: localhost
  port: 5432
  name: brainsentry
  user: brainsentry
  password: brainsentry
  max_connections: 20
  min_connections: 5

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

falkordb:
  host: localhost
  port: 6379
  password: ""
  graph_name: brainsentry

security:
  jwt_secret: "your-256-bit-secret-key-change-in-production-min-32-chars"
  jwt_expiration: 24h
  bcrypt_cost: 12
  cors:
    allowed_origins:
      - "http://localhost:3000"
      - "http://localhost:5173"
      - "http://localhost:5174"
      - "http://localhost:5175"
      - "http://localhost:6174"
    allowed_methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
      - PATCH

tenant:
  default_id: "a9f814d2-4dae-41f3-851b-8aa3d4706561"

ai:
  provider: openrouter
  model: "x-ai/grok-4-fast"
  api_key: ""
  base_url: "https://openrouter.ai/api/v1"
  temperature: 0.2
  max_tokens: 500
  timeout: 60s
  max_retries: 3

embedding:
  model: "all-MiniLM-L6-v2"
  dimensions: 384

interception:
  quick_check_enabled: true
  deep_analysis_enabled: true
  relevance_threshold: 0.7

memory:
  auto_capture: true
  auto_importance: true
  obsolescence_days: 90

logging:
  level: info
  format: json
