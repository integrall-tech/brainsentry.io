name: Frontend E2E

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: brain-sentry-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm via corepack — `npm ci` consistently hung ~8min on this
      # repo's dep tree and tripped npm 10.x's "Exit handler never
      # called!" bug. pnpm with the committed pnpm-lock.yaml runs the
      # same install in ~10s. Pin the version so CI matches the image
      # build and developer machines.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.4.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: brain-sentry-frontend/pnpm-lock.yaml

      - name: Install Dependencies
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright Tests
        run: pnpm exec playwright test

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: brain-sentry-frontend/playwright-report/
          retention-days: 14

      - name: Upload Playwright Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: brain-sentry-frontend/test-results/
          retention-days: 14
