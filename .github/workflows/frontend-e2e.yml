name: Frontend E2E

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: brain-sentry-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: brain-sentry-frontend/package-lock.json

      - name: Install Dependencies
        # NODE_OPTIONS bumps V8's old-space; --no-audit/--no-fund silence
        # the network calls that aggravate npm 10.x's "Exit handler
        # never called!" bug on GHA runners with large dep trees.
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          NPM_CONFIG_UPDATE_NOTIFIER: "false"
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        run: npx playwright test

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: brain-sentry-frontend/playwright-report/
          retention-days: 14

      - name: Upload Playwright Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: brain-sentry-frontend/test-results/
          retention-days: 14
