name: Build Frontend Image

# Trigger on frontend changes to main, on version tags, and on demand.
# Pull requests build but do NOT push.
on:
  push:
    branches: [main]
    tags: ['v*.*.*']
    paths:
      - 'brain-sentry-frontend/**'
      - '.github/workflows/build-frontend-image.yml'
  pull_request:
    paths:
      - 'brain-sentry-frontend/**'
      - '.github/workflows/build-frontend-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/integrall-tech/brainsentry-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./brain-sentry-frontend
          file: ./brain-sentry-frontend/Dockerfile
          platforms: linux/amd64
          # VITE_API_URL defaults to "/api" inside the Dockerfile; the
          # baked SPA hits a relative path and nginx proxies it to the
          # brainsentry-backend service on the swarm overlay network.
          # Override with a build-arg here if an env needs an external
          # API URL.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
          provenance: false
